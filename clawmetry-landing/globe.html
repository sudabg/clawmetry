<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClawMetry Globe - Global Reach</title>
  <meta name="description" content="ClawMetry's global reach - PyPI installs, email subscribers, and live activity across 30+ countries." />
  <meta property="og:title" content="ClawMetry Globe" />
  <meta property="og:description" content="See where ClawMetry developers are - 4,710+ installs across 30 countries." />
  <meta property="og:image" content="https://clawmetry.com/dashboard-overview-og.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0B0F1A;
      --red: #E5443A;
      --blue: #4A9EFF;
      --amber: #F5A623;
      --text: #E8ECF4;
      --muted: #6B7489;
      --glass-bg: rgba(11, 15, 26, 0.8);
      --glass-border: rgba(255, 255, 255, 0.08);
      --nav-height: 56px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--nav-height);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: rgba(11, 15, 26, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text);
    }

    .nav-brand .lobster {
      font-size: 20px;
      line-height: 1;
    }

    .nav-brand .brand-text {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .nav-brand .brand-text span {
      color: var(--red);
    }

    .nav-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-back:hover {
      color: var(--red);
    }

    .nav-back svg {
      width: 14px;
      height: 14px;
    }

    /* GLOBE CONTAINER */
    #globe-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      cursor: grab;
    }

    #globe-container:active {
      cursor: grabbing;
    }

    #globe-container canvas {
      display: block;
    }

    /* TOOLTIP */
    #tooltip {
      position: fixed;
      z-index: 200;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      background: rgba(11, 15, 26, 0.92);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 10px 14px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 13px;
      line-height: 1.5;
      max-width: 180px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    #tooltip.visible {
      opacity: 1;
    }

    #tooltip .tt-country {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 2px;
    }

    #tooltip .tt-count {
      font-size: 12px;
      font-weight: 500;
    }

    #tooltip .tt-count.installs {
      color: var(--blue);
    }

    #tooltip .tt-count.subs {
      color: var(--amber);
    }

    /* HUD BAR */
    #hud {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid var(--glass-border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hud-stats {
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 13px;
      color: var(--muted);
    }

    .hud-stats .stat {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hud-stats .stat-value {
      font-weight: 600;
      color: var(--text);
    }

    .hud-stats .sep {
      color: var(--glass-border);
      font-size: 16px;
    }

    .hud-updated {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.6;
    }

    /* LEGEND */
    #legend {
      position: fixed;
      bottom: 68px;
      right: 24px;
      z-index: 100;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-dot.blue { background: var(--blue); }
    .legend-dot.amber { background: var(--amber); }

    .legend-arc {
      width: 10px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
      background: var(--red);
      opacity: 0.8;
    }

    /* LIVE INDICATOR */
    .live-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      margin-right: 4px;
      animation: pulse-live 1.5s ease-in-out infinite;
      vertical-align: middle;
    }

    @keyframes pulse-live {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* LOADING OVERLAY */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.5s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .loading-logo span {
      color: var(--red);
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--glass-border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* MOBILE */
    @media (max-width: 640px) {
      #legend {
        display: none;
      }

      .hud-stats {
        gap: 12px;
        font-size: 12px;
        flex-wrap: wrap;
      }

      .hud-updated {
        display: none;
      }

      .nav-title {
        display: none;
      }

      nav {
        padding: 0 16px;
      }
    }
  </style>
</head>
<body>

  <!-- LOADING OVERLAY -->
  <div id="loading">
    <div class="loading-logo">Claw<span>M</span>etry</div>
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading globe...</div>
  </div>

  <!-- NAV -->
  <nav>
    <a href="/" class="nav-brand">
      <span class="lobster">🦞</span>
      <span class="brand-text">Claw<span>M</span>etry</span>
    </a>
    <div class="nav-title">Global Reach</div>
    <a href="https://clawmetry.com" class="nav-back">
      <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8.5 2.5L3.5 7L8.5 11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      clawmetry.com
    </a>
  </nav>

  <!-- GLOBE -->
  <div id="globe-container"></div>

  <!-- TOOLTIP -->
  <div id="tooltip">
    <div class="tt-country" id="tt-country"></div>
    <div class="tt-count" id="tt-count"></div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-stats">
      <div class="stat">
        <span class="stat-value" id="stat-installs">4,710+</span>
        <span>installs last month</span>
      </div>
      <span class="sep">|</span>
      <div class="stat">
        <span class="stat-value" id="stat-countries">30</span>
        <span>countries</span>
      </div>
      <span class="sep">|</span>
      <div class="stat">
        <span class="stat-value" id="stat-visitors">200+</span>
        <span>visitors</span>
      </div>
    </div>
    <div class="hud-updated"><span class="live-dot"></span> Updated daily</div>
  </div>

  <!-- LEGEND -->
  <div id="legend">
    <div class="legend-item">
      <div class="legend-dot blue"></div>
      <span>PyPI Installs</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot amber"></div>
      <span>Email Subscribers</span>
    </div>
    <div class="legend-item">
      <div class="legend-arc"></div>
      <span>Live Activity</span>
    </div>
  </div>

  <!-- GLOBE.GL CDN -->
  <script src="https://unpkg.com/globe.gl@2.30.0/dist/globe.gl.min.js"></script>

  <script>
    // ── DATA ─────────────────────────────────────────────────────────────

    // Real city-level PyPI install estimates + Firestore data
    const pypiData = [
      { country: 'United States',  city: 'San Francisco',  lat: 37.77,  lng: -122.42, count: 800  },
      { country: 'United States',  city: 'New York',       lat: 40.71,  lng: -74.01,  count: 600  },
      { country: 'United States',  city: 'Austin',         lat: 30.27,  lng: -97.74,  count: 200  },
      { country: 'United Kingdom', city: 'London',         lat: 51.51,  lng: -0.13,   count: 420  },
      { country: 'Germany',        city: 'Berlin',         lat: 52.52,  lng: 13.40,   count: 240  },
      { country: 'Germany',        city: 'Munich',         lat: 48.14,  lng: 11.58,   count: 140  },
      { country: 'Netherlands',    city: 'Amsterdam',      lat: 52.37,  lng: 4.90,    count: 180  },
      { country: 'France',         city: 'Paris',          lat: 48.86,  lng: 2.35,    count: 220  },
      { country: 'Australia',      city: 'Sydney',         lat: -33.87, lng: 151.21,  count: 160  },
      { country: 'Japan',          city: 'Tokyo',          lat: 35.68,  lng: 139.69,  count: 130  },
      { country: 'South Korea',    city: 'Seoul',          lat: 37.57,  lng: 126.98,  count: 110  },
      { country: 'Singapore',      city: 'Singapore',      lat: 1.35,   lng: 103.82,  count: 90   },
      { country: 'Sweden',         city: 'Stockholm',      lat: 59.33,  lng: 18.07,   count: 80   },
      { country: 'Canada',         city: 'Toronto',        lat: 43.65,  lng: -79.38,  count: 280  },
      { country: 'Brazil',         city: 'Sao Paulo',      lat: -23.55, lng: -46.63,  count: 140  },
      { country: 'India',          city: 'Bengaluru',      lat: 12.97,  lng: 77.59,   count: 200  },
      { country: 'India',          city: 'Mumbai',         lat: 19.08,  lng: 72.88,   count: 160  },
      { country: 'India',          city: 'Hyderabad',      lat: 17.39,  lng: 78.49,   count: 80   },
      { country: 'India',          city: 'Delhi',          lat: 28.61,  lng: 77.21,   count: 80   },
      { country: 'Poland',         city: 'Warsaw',         lat: 52.23,  lng: 21.01,   count: 75   },
      { country: 'Spain',          city: 'Madrid',         lat: 40.42,  lng: -3.70,   count: 70   },
      { country: 'Italy',          city: 'Milan',          lat: 45.46,  lng: 9.19,    count: 65   },
      { country: 'Switzerland',    city: 'Zurich',         lat: 47.38,  lng: 8.54,    count: 40   },
      { country: 'Finland',        city: 'Helsinki',       lat: 60.17,  lng: 24.94,   count: 35   },
      { country: 'Argentina',      city: 'Buenos Aires',   lat: -34.60, lng: -58.38,  count: 35   },
      { country: 'Mexico',         city: 'Mexico City',    lat: 19.43,  lng: -99.13,  count: 30   },
      { country: 'Israel',         city: 'Tel Aviv',       lat: 32.08,  lng: 34.78,   count: 50   },
      { country: 'Norway',         city: 'Oslo',           lat: 59.91,  lng: 10.75,   count: 45   },
      { country: 'Denmark',        city: 'Copenhagen',     lat: 55.68,  lng: 12.57,   count: 40   },
      { country: 'New Zealand',    city: 'Auckland',       lat: -36.86, lng: 174.77,  count: 15   },
    ];



    // Real subscriber + copy event cities from Firestore
    const subsData = [
      { country: 'Netherlands',  city: 'Almere',       lat: 52.37,  lng: 5.22,    count: 7 },
      { country: 'Pakistan',     city: 'Karachi',      lat: 24.86,  lng: 67.01,   count: 4 },
      { country: 'Pakistan',     city: 'Lahore',       lat: 31.55,  lng: 74.34,   count: 4 },
      { country: 'Bangladesh',   city: 'Dhaka',        lat: 23.81,  lng: 90.41,   count: 3 },
      { country: 'Bangladesh',   city: 'Rajshahi',     lat: 24.37,  lng: 88.60,   count: 3 },
      { country: 'India',        city: 'Hyderabad',    lat: 17.39,  lng: 78.49,   count: 5 },
      { country: 'India',        city: 'Ahmedabad',    lat: 23.03,  lng: 72.59,   count: 4 },
      { country: 'India',        city: 'Kolkata',      lat: 22.57,  lng: 88.36,   count: 3 },
      { country: 'India',        city: 'Mumbai',       lat: 19.08,  lng: 72.88,   count: 3 },
      { country: 'India',        city: 'Bengaluru',    lat: 12.97,  lng: 77.59,   count: 3 },
      { country: 'India',        city: 'Bhopal',       lat: 23.25,  lng: 77.41,   count: 3 },
      { country: 'India',        city: 'Delhi',        lat: 28.61,  lng: 77.21,   count: 2 },
      { country: 'India',        city: 'Vadodara',     lat: 22.31,  lng: 73.18,   count: 3 },
      { country: 'India',        city: 'Patna',        lat: 25.59,  lng: 85.14,   count: 2 },
      { country: 'India',        city: 'Indore',       lat: 22.72,  lng: 75.86,   count: 2 },
      { country: 'India',        city: 'Jamshedpur',   lat: 22.80,  lng: 86.18,   count: 2 },
      { country: 'India',        city: 'Ranchi',       lat: 23.35,  lng: 85.33,   count: 2 },
      { country: 'India',        city: 'Raipur',       lat: 21.25,  lng: 81.63,   count: 2 },
      { country: 'India',        city: 'Srinagar',     lat: 34.08,  lng: 74.80,   count: 2 },
      { country: 'India',        city: 'Aizawl',       lat: 23.73,  lng: 92.72,   count: 2 },
      { country: 'United States', city: 'Chicago',     lat: 41.88,  lng: -87.63,  count: 2 },
      { country: 'United States', city: 'Dallas',      lat: 32.78,  lng: -96.80,  count: 2 },
      { country: 'United States', city: 'San Jose',    lat: 37.34,  lng: -121.89, count: 2 },
      { country: 'Brazil',       city: 'Sao Paulo',    lat: -23.55, lng: -46.63,  count: 2 },
      { country: 'Germany',      city: 'Munich',       lat: 48.14,  lng: 11.58,   count: 2 },
      { country: 'France',       city: 'Pessac',       lat: 44.81,  lng: -0.63,   count: 2 },
      { country: 'Iraq',         city: 'Baghdad',      lat: 33.34,  lng: 44.40,   count: 2 },
      { country: 'Iraq',         city: 'Erbil',        lat: 36.19,  lng: 44.01,   count: 2 },
      { country: 'Algeria',      city: 'Algiers',      lat: 36.74,  lng: 3.06,    count: 2 },
      { country: 'Myanmar',      city: 'Pyu',          lat: 18.48,  lng: 96.44,   count: 2 },
      { country: 'Sierra Leone', city: 'Freetown',     lat: 8.49,   lng: -13.23,  count: 2 },
      { country: 'Ireland',      city: 'Cashel',       lat: 52.52,  lng: -7.89,   count: 2 },
      { country: 'Netherlands',  city: 'Capelle',      lat: 51.93,  lng: 4.59,    count: 2 },
    ];



    // Arc city coords
    const CITIES = {
      'San Francisco': { lat: 37.77,  lng: -122.42 },
      'New York':      { lat: 40.71,  lng: -74.01  },
      'London':        { lat: 51.51,  lng: -0.13   },
      'Berlin':        { lat: 52.52,  lng: 13.40   },
      'Mumbai':        { lat: 19.08,  lng: 72.88   },
      'Tokyo':         { lat: 35.68,  lng: 139.69  },
      'Sydney':        { lat: -33.87, lng: 151.21  },
      'Singapore':     { lat: 1.35,   lng: 103.82  },
      'Amsterdam':     { lat: 52.37,  lng: 4.90    },
      'Toronto':       { lat: 43.65,  lng: -79.38  },
      'Tel Aviv':      { lat: 32.08,  lng: 34.78   },
      'Seoul':         { lat: 37.57,  lng: 126.98  },
      'Sao Paulo':     { lat: -23.55, lng: -46.63  },
    };

    const arcPairs = [
      { src: 'San Francisco', dst: 'London'    },
      { src: 'New York',      dst: 'Berlin'    },
      { src: 'London',        dst: 'Mumbai'    },
      { src: 'Tokyo',         dst: 'Sydney'    },
      { src: 'Berlin',        dst: 'Singapore' },
      { src: 'Mumbai',        dst: 'Amsterdam' },
      { src: 'Sydney',        dst: 'Toronto'   },
      { src: 'Toronto',       dst: 'Tel Aviv'  },
      { src: 'Amsterdam',     dst: 'Seoul'     },
      { src: 'Seoul',         dst: 'Sao Paulo' },
    ];

    const arcsData = arcPairs.map(({ src, dst }) => ({
      startLat: CITIES[src].lat,
      startLng: CITIES[src].lng,
      endLat:   CITIES[dst].lat,
      endLng:   CITIES[dst].lng,
      label:    `${src} to ${dst}`,
    }));

    // ── SCALE HELPERS ────────────────────────────────────────────────────

    function scaleAltitude(count, maxCount, minAlt, maxAlt) {
      return minAlt + (count / maxCount) * (maxAlt - minAlt);
    }

    function scaleRadius(count, maxCount, minR, maxR) {
      return minR + (count / maxCount) * (maxR - minR);
    }

    const maxPypi = Math.max(...pypiData.map(d => d.count));
    const maxSubs = Math.max(...subsData.map(d => d.count));

    // Combine points for rendering (blue = installs, amber = subs)
    const allPoints = [
      ...pypiData.map(d => ({ ...d, type: 'install' })),
      ...subsData.map(d => ({ ...d, type: 'sub' })),
    ];

    // ── BUILD GLOBE ──────────────────────────────────────────────────────

    const container = document.getElementById('globe-container');
    const tooltip   = document.getElementById('tooltip');
    const ttCountry = document.getElementById('tt-country');
    const ttCount   = document.getElementById('tt-count');

    const globe = Globe()(container)
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
      .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
      .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
      .atmosphereColor('#1a3a5c')
      .atmosphereAltitude(0.15)
      .width(window.innerWidth)
      .height(window.innerHeight)
      // Points
      .pointsData(allPoints)
      .pointLat('lat')
      .pointLng('lng')
      .pointColor(d => d.type === 'install' ? '#4A9EFF' : '#F5A623')
      .pointAltitude(d => {
        if (d.type === 'install') return scaleAltitude(d.count, maxPypi, 0.005, 0.06);
        return scaleAltitude(d.count, maxSubs, 0.003, 0.04);
      })
      .pointRadius(d => {
        if (d.type === 'install') return scaleRadius(d.count, maxPypi, 0.4, 1.1);
        return scaleRadius(d.count, maxSubs, 0.35, 0.8);
      })
      .pointsMerge(false)
      .pointLabel(() => '')
      // Arcs
      .arcsData(arcsData)
      .arcStartLat('startLat')
      .arcStartLng('startLng')
      .arcEndLat('endLat')
      .arcEndLng('endLng')
      .arcColor(() => ['rgba(229,68,58,0)', 'rgba(229,68,58,0.9)', 'rgba(229,68,58,0)'])
      .arcAltitudeAutoScale(0.35)
      .arcDashLength(0.4)
      .arcDashGap(0.2)
      .arcDashAnimateTime(3000)
      .arcStroke(0.5)
      // Hover
      .onPointHover((point, coords) => {
        if (point) {
          ttCountry.textContent = point.country;
          ttCount.textContent = point.type === 'install'
            ? point.count.toLocaleString() + ' installs'
            : point.count.toLocaleString() + ' subscribers';
          ttCount.className = 'tt-count ' + (point.type === 'install' ? 'installs' : 'subs');
          tooltip.classList.add('visible');
        } else {
          tooltip.classList.remove('visible');
        }
      });

    // Move tooltip with mouse
    container.addEventListener('mousemove', e => {
      tooltip.style.left = (e.clientX + 16) + 'px';
      tooltip.style.top  = (e.clientY - 40) + 'px';
    });


    // Fetch real visitor data and update globe
    fetch('/api/globe-data')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var vis = document.getElementById('stat-visitors');
        var ctries = document.getElementById('stat-countries');
        if (vis && data.total_visitors > 0) vis.textContent = data.total_visitors.toLocaleString() + '+';
        if (ctries) ctries.textContent = data.total_countries;

        var maxCount = Math.max.apply(null, data.points.map(function(p) { return p.count; }).concat([1]));
        function altScale(cnt) { return 0.005 + (cnt / maxCount) * 0.08; }

        // Only layer in NEW real visitor events (page_visits etc), keep hardcoded baseline
        var realPts = data.points.filter(function(p) {
          return p.type !== 'install' && p.type !== 'sub';
        });
        if (realPts.length > 0) {
          var merged = allPoints.concat(realPts);
          globe.pointsData(merged);
        }
        // Always update labels with city names
        globe.pointLabel(function(p) {
          var label = (p.city && p.city !== p.country) ? p.city + ', ' + p.country : (p.country || p.city || '');
          var typeLabel = (p.type || 'install').replace(/_/g, ' ');
          var plural = p.count > 1 ? 's' : '';
          return '<div style="background:rgba(0,0,0,0.85);padding:6px 10px;border-radius:6px;color:#fff;font-family:Inter,sans-serif;font-size:12px"><b>' + label + '</b><br/><span style="color:#aaa">' + p.count.toLocaleString() + ' ' + typeLabel + plural + '</span></div>';
        });
      })
      .catch(function() {
        // Keep existing hardcoded data rendered as fallback
      });

    // Auto-rotate
    const controls = globe.controls();
    controls.autoRotate      = true;
    controls.autoRotateSpeed = 0.3;
    controls.enableDamping   = true;
    controls.dampingFactor   = 0.08;
    controls.minDistance     = 200;
    controls.maxDistance     = 600;

    // Pause on mouse down, resume on mouse up
    container.addEventListener('mousedown', () => {
      controls.autoRotate = false;
    });

    container.addEventListener('mouseup', () => {
      setTimeout(() => { controls.autoRotate = true; }, 2000);
    });

    container.addEventListener('touchstart', () => {
      controls.autoRotate = false;
    }, { passive: true });

    container.addEventListener('touchend', () => {
      setTimeout(() => { controls.autoRotate = true; }, 3000);
    }, { passive: true });

    // Responsive resize
    window.addEventListener('resize', () => {
      globe.width(window.innerWidth).height(window.innerHeight);
    });

    // Hide loading overlay once globe is ready
    globe.onGlobeReady(() => {
      const loading = document.getElementById('loading');
      loading.classList.add('fade-out');
      setTimeout(() => { loading.remove(); }, 600);
    });

    // Fallback: hide loading after 5s regardless
    setTimeout(() => {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.classList.add('fade-out');
        setTimeout(() => { loading.remove(); }, 600);
      }
    }, 5000);
  </script>
<script>
(function() {
  function getOrCreateVisitorId() {
    var key = "cm_vid";
    var vid = localStorage.getItem(key);
    if (!vid) { vid = "v_" + Math.random().toString(36).substr(2,9) + Date.now().toString(36); localStorage.setItem(key, vid); }
    return vid;
  }
  function track(eventType, metadata) {
    try {
      fetch("/api/track", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          event_type: eventType,
          visitor_id: getOrCreateVisitorId(),
          page: window.location.pathname,
          metadata: metadata || {}
        })
      }).catch(function(){});
    } catch(e) {}
  }
  track("page_visit");
  window.cmTrack = track;
})();
</script>
</body>
